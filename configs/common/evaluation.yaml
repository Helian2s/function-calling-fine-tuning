evaluation:
  metric_schema_version: "1.0"
  scored_prediction_schema_version: "1.0"
  order_matters: false
  deterministic_decoding:
    do_sample: false
    seed: 42
    max_new_tokens: 256
  prompt_construction:
    remove_target_assistant_message: true
    add_generation_prompt: true
    enable_thinking: false
    preserve_tools: true
  baseline:
    test_limit: 20
    predictions: /workspace/results/exp-00/baseline/predictions.jsonl
    output_dir: /workspace/results/exp-00/baseline
  baseline_1000:
    dataset: /workspace/data/eval/stratified_1000/normalized/test.jsonl
    expected_records: 1000
    predictions: /workspace/results/exp-00/baseline-1000/predictions.jsonl
    output_dir: /workspace/results/exp-00/baseline-1000
  full_test:
    expected_records: 40
    predictions: /workspace/results/exp-00/predictions.jsonl
    output_dir: /workspace/results/exp-00
  outputs:
    scored_predictions: scored_predictions.jsonl
    parse_failures: parse_failures.jsonl
    scores: scores.json
    requested_metrics: requested_metrics.json
    failure_sample: failure_sample.jsonl
    summary_markdown: summary.md
    checksums: checksums.sha256
  grouped_metrics:
    - call_category
    - primary_tool_family
    - primary_api_category
    - seen_status
    - length_bucket
    - expected_call_count_bucket
    - tool_count_bucket
    - split_lock_status
    - primary_split
  paired_comparison:
    bootstrap_seed: 42
    bootstrap_samples: 1000
    bootstrap_confidence: 0.95
